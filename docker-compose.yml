version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: erp_terrenos_db
    environment:
      POSTGRES_DB: erp_terrenos
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: erp_terrenos_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
